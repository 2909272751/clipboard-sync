# Clipboard Sync Uploader config
#
# SERVER_URL must include http:// or https:// and must not end with /api/push.
# Example:
# SERVER_URL="http://192.168.1.20:5000"
# SERVER_URL="https://smsync.example.com"
SERVER_URL=""

# Copy this token from the web device page: /devices
DEVICE_TOKEN=""

# This is only used in logs. The server device name comes from the token.
DEVICE_NAME="Android"

# Personalized downloads contain a unique ID. It lets a newly downloaded
# module replace an older saved configuration exactly once after flashing.
PROVISION_ID=""

# The standard module is event driven. There is no periodic clipboard scan.

# Show the synchronized content preview after a successful upload or receive. Set to 0 to disable.
SHOW_TOAST=1
