{% extends "base.html" %}
{% block title %}创建账号{% endblock %}
{% block content %}
<section class="card auth-card">
    <div class="auth-brand"><span class="brand-mark" aria-hidden="true">⇄</span><strong>Clipboard Sync</strong></div>
    <h1 class="auth-title">创建账号</h1>
    <p class="auth-description">管理员已开放注册。每个账号的数据、文件和设备彼此隔离。</p>
    <form method="POST" class="form-stack">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label><span class="field-label">用户名</span><input type="text" name="username" minlength="3" maxlength="40" pattern="[A-Za-z0-9_.-]+" autocomplete="username" placeholder="3–40 位字母、数字或符号" required autofocus></label>
        <label><span class="field-label">密码</span><input type="password" name="password" minlength="10" autocomplete="new-password" placeholder="至少 10 位" required></label>
        <button type="submit" class="btn btn-primary btn-block">注册并登录</button>
    </form>
    <p class="auth-footer"><a href="/login">返回登录</a></p>
</section>
{% endblock %}
