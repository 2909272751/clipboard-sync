{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:420px; margin:70px auto;">
    <h2 style="text-align:center; color:var(--main); margin-top:0;">创建账号</h2>
    <p style="color:#666; line-height:1.6;">服务器管理员当前已开放注册。新账号是普通用户账号，数据和设备彼此隔离。</p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="username" minlength="3" maxlength="40" pattern="[A-Za-z0-9_.-]+" placeholder="用户名" required autofocus>
        <input type="password" name="password" minlength="10" placeholder="密码（至少 10 位）" required>
        <button type="submit" class="btn btn-main">注册</button>
    </form>
    <p style="text-align:center; margin-top:20px;"><a href="/login">返回登录</a></p>
</div>
{% endblock %}
