{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:400px; margin: 100px auto;">
    <h2 style="text-align:center; color:var(--main); margin-top:0;">登 录</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="username" placeholder="用户名" required autofocus>
        <input type="password" name="password" placeholder="密码" required>
        <button type="submit" class="btn btn-main">进入中心</button>
    </form>
    {% if public_registration %}
    <p style="text-align:center; margin-top:20px;"><a href="/register">创建新账号</a></p>
    {% else %}
    <p style="text-align:center; margin-top:20px; font-size:13px; color:#999;">当前未开放注册，请联系管理员获取邀请链接。</p>
    {% endif %}
</div>
{% endblock %}
