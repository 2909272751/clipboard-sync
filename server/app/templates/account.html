{% extends "base.html" %}
{% block title %}账号设置{% endblock %}
{% block content %}
<header class="page-heading">
    <div><p class="page-kicker">Account</p><h1>账号设置</h1><p class="page-description">更新当前账号的登录密码。</p></div>
</header>
<div class="page-grid">
    <section class="card span-6">
        <h2 class="card-title">修改密码</h2>
        <p class="card-description">当前账号：<strong>{{ session.username }}</strong></p>
        <form method="POST" class="form-stack">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label><span class="field-label">当前密码</span><input type="password" name="current_password" autocomplete="current-password" placeholder="请输入当前密码" required></label>
            <label><span class="field-label">新密码</span><input type="password" name="new_password" minlength="10" autocomplete="new-password" placeholder="至少 10 位" required></label>
            <label><span class="field-label">确认新密码</span><input type="password" name="confirm_password" minlength="10" autocomplete="new-password" placeholder="再次输入新密码" required></label>
            <button type="submit" class="btn btn-primary btn-block">保存新密码</button>
        </form>
    </section>
    <aside class="card span-6">
        <h2 class="card-title">安全建议</h2>
        <p class="card-description">使用未在其他网站重复使用的长密码。修改密码不会删除历史或设备配置。</p>
        <div class="notice notice-primary"><strong>设备令牌不受影响</strong>Windows 和 Magisk 客户端会继续正常同步。</div>
    </aside>
</div>
{% endblock %}
