{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:460px; margin:40px auto;">
    <h2 style="margin-top:0; color:var(--main);">修改密码</h2>
    <p style="color:#666; line-height:1.6;">当前账号：<b>{{ session.username }}</b></p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="password" name="current_password" placeholder="当前密码" required>
        <input type="password" name="new_password" minlength="10" placeholder="新密码（至少 10 位）" required>
        <input type="password" name="confirm_password" minlength="10" placeholder="再次输入新密码" required>
        <button type="submit" class="btn btn-main">保存新密码</button>
    </form>
</div>
{% endblock %}
