{% extends "base.html" %}
{% block title %}接受邀请{% endblock %}
{% block content %}
<section class="card auth-card">
    <div class="auth-brand"><span class="brand-mark" aria-hidden="true">⇄</span><strong>Clipboard Sync</strong></div>
    <h1 class="auth-title">接受邀请</h1>
    <p class="auth-description">此邀请只能成功使用一次。账号创建完成后，邀请链接将立即失效。</p>
    <form method="POST" class="form-stack">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label><span class="field-label">用户名</span><input type="text" name="username" minlength="3" maxlength="40" pattern="[A-Za-z0-9_.-]+" autocomplete="username" placeholder="请输入用户名" required autofocus></label>
        <label><span class="field-label">密码</span><input type="password" name="password" minlength="10" autocomplete="new-password" placeholder="至少 10 位" required></label>
        <button type="submit" class="btn btn-primary btn-block">创建账号</button>
    </form>
</section>
{% endblock %}
