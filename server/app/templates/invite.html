{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:420px; margin:70px auto;">
    <h2 style="text-align:center; color:var(--main); margin-top:0;">接受邀请</h2>
    <p style="color:#666; line-height:1.6;">此邀请只能成功使用一次。账号创建后，邀请链接会立即失效。</p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="username" minlength="3" maxlength="40" pattern="[A-Za-z0-9_.-]+" placeholder="用户名" required autofocus>
        <input type="password" name="password" minlength="10" placeholder="密码（至少 10 位）" required>
        <button type="submit" class="btn btn-main">创建账号</button>
    </form>
</div>
{% endblock %}
