services:
  clipsync:
    build: .
    image: clipboard-sync:1.3.3
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${PORT:-5000}:5000"
    volumes:
      - ${DATA_DIR:-./data}:/data
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SECRET_KEY: ${SECRET_KEY:?Run ./install.sh first}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-0}
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

  caddy:
    image: caddy:2.10-alpine
    profiles: ["https"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - clipsync
    security_opt:
      - no-new-privileges:true

volumes:
  caddy_data:
  caddy_config:
